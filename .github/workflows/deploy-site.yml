name: Deploy site

on:
  push:
    branches: [master, main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json
      - name: Install
        working-directory: site
        run: npm install
      - name: Build
        working-directory: site
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build
      # Cloudflare Pages connects to the repo directly and deploys on push;
      # this job exists as a build-check / safety net.
      - name: Verify build output
        run: test -d site/dist && ls site/dist | head -20
