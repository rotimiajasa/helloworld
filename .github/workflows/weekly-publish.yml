name: Weekly content batch

on:
  schedule:
    # Mondays 06:00 UTC = 07:00 WAT
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run research only, don't draft"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: orchestrator/package-lock.json

      - name: Install
        working-directory: orchestrator
        run: npm install

      - name: Run orchestrator
        working-directory: orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          SERP_PROVIDER: brave
          SITE_URL: ${{ vars.SITE_URL }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: npm run weekly

      - name: Open draft PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: weekly/${{ github.run_number }}
          title: "Weekly content batch — ${{ github.run_number }}"
          body: |
            Auto-generated by the weekly orchestrator.

            **Required human pass before merging:**
            - [ ] Skim each article — kill anything inaccurate.
            - [ ] Replace every `[YOUR-STORY]` placeholder with 1–2 sentences of personal experience.
            - [ ] Confirm Naira figures still match current rates.
            - [ ] Flip `draft: true` → `draft: false` in frontmatter to publish.
            - [ ] Schedule the newsletter from `out/.../newsletter.md`.
            - [ ] Schedule the tweet threads from `out/.../thread-*.md`.
          commit-message: "chore(content): weekly batch ${{ github.run_number }}"
          delete-branch: true
          draft: true
