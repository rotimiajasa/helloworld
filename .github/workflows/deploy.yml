name: Deploy to cPanel

on:
  push:
    branches:
      - master
      - claude/peaceful-fermi-U7JQy
  workflow_dispatch:

concurrency:
  group: deploy-cpanel
  cancel-in-progress: false

jobs:
  # ── Original site (runs on master only) ──────────────────────────
  ftp-deploy:
    name: Sync site to cPanel via FTPS
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: ./
          local-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/README.md
            **/node_modules/**
            **/.DS_Store

  # ── Troan Digital cybersecurity site → troandigital.net/public_html/ ──
  deploy-troandigital:
    name: Deploy Troan Digital site to public_html
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy troandigital/ → troandigital.net/public_html/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TROAN_FTP_SERVER }}
          # Use the main cPanel username (troaddib), NOT the sub-FTP account.
          # The main account can reach all paths under /home/troaddib/.
          # Secret value should be:  troaddib@troandigital.net  (or just: troaddib)
          username: ${{ secrets.TROAN_FTP_USERNAME }}
          password: ${{ secrets.TROAN_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./troandigital/
          # Path relative to the main cPanel account's FTP root (/home/troaddib/)
          server-dir: /troandigital.net/public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
            **/.DS_Store
