<style>
/* ============================================
   PINNACLE WELLNESS — DESIGN SYSTEM
   Editorial luxury + brand gradient accent
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700;800&family=Caveat:wght@400;500;600;700&display=swap');

:root {
  /* Brand gradient */
  --grad-purple: #6B2BB8;
  --grad-blue: #1E5BC6;
  --grad-green: #4FB14A;
  --brand-gradient: linear-gradient(135deg, #6B2BB8 0%, #1E5BC6 50%, #4FB14A 100%);
  --brand-gradient-soft: linear-gradient(135deg, rgba(107,43,184,0.08) 0%, rgba(30,91,198,0.06) 50%, rgba(79,177,74,0.08) 100%);

  /* Editorial palette */
  --ink: #1a1814;
  --ink-soft: #2d2820;
  --ink-mute: #5a5448;
  --paper: #faf7f2;
  --paper-warm: #f3ede2;
  --cream: #ede4d3;
  --gold: #c9a961;
  --gold-deep: #a8893f;
  --gold-soft: #e8d9b0;

  /* Functional */
  --line: #e3dccd;
  --line-soft: #efe9dc;
  --success: #4FB14A;
  --danger: #b84a3a;

  /* Type */
  --serif: 'Cormorant Garamond', 'Times New Roman', serif;
  --sans: 'Manrope', system-ui, sans-serif;
  --script: 'Caveat', cursive;

  /* Spacing rhythm */
  --shadow-sm: 0 2px 8px rgba(26,24,20,0.06);
  --shadow-md: 0 8px 24px rgba(26,24,20,0.08);
  --shadow-lg: 0 24px 60px rgba(26,24,20,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  color: var(--ink);
  background: var(--paper);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'ss01', 'cv11';
}

/* === Type === */
.serif { font-family: var(--serif); font-weight: 500; letter-spacing: -0.01em; }
.script { font-family: var(--script); }
.eyebrow {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--ink-mute);
}
.eyebrow-gold { color: var(--gold-deep); }

h1, h2, h3, h4 { font-family: var(--serif); font-weight: 500; letter-spacing: -0.015em; line-height: 1.05; color: var(--ink); }
.display { font-family: var(--serif); font-weight: 400; letter-spacing: -0.025em; line-height: 0.95; }

.gold-text { color: var(--gold-deep); }
.italic-script { font-family: var(--serif); font-style: italic; font-weight: 400; }

/* gradient text (used sparingly) */
.grad-text {
  background: var(--brand-gradient);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

/* === Buttons === */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 14px 28px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.25s ease;
  border-radius: 0;
}
.btn-primary {
  background: var(--ink);
  color: var(--paper);
}
.btn-primary:hover { background: #000; transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-gold {
  background: var(--gold);
  color: var(--ink);
}
.btn-gold:hover { background: var(--gold-deep); color: var(--paper); }
.btn-outline {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--ink);
}
.btn-outline:hover { background: var(--ink); color: var(--paper); }
.btn-grad {
  background: var(--brand-gradient);
  color: white;
  position: relative;
}
.btn-grad:hover { box-shadow: 0 8px 24px rgba(107,43,184,0.3); transform: translateY(-1px); }
.btn-ghost {
  background: transparent;
  color: var(--ink);
  padding: 8px 0;
  border-bottom: 1px solid var(--ink);
  letter-spacing: 0.16em;
}
.btn-ghost:hover { color: var(--gold-deep); border-color: var(--gold-deep); }

/* === Layout === */
.container {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
}
.container-narrow { max-width: 980px; margin: 0 auto; padding: 0 32px; }

/* divider */
.rule {
  height: 1px;
  background: var(--line);
  width: 100%;
}
.rule-gold {
  height: 1px;
  background: var(--gold);
  width: 60px;
}

/* badges */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 6px 12px;
  border: 1px solid currentColor;
  color: var(--gold-deep);
  background: rgba(255,255,255,0.6);
}
.badge-grad {
  background: var(--brand-gradient);
  color: white;
  border: none;
}
.badge-solid {
  background: var(--ink);
  color: var(--paper);
  border: none;
}

/* product card hover */
.product-card { cursor: pointer; transition: transform 0.4s ease; }
.product-card:hover { transform: translateY(-4px); }
.product-card .img-wrap { position: relative; overflow: hidden; }
.product-card .img-wrap img,
.product-card .img-wrap .placeholder {
  transition: transform 0.7s ease;
}
.product-card:hover .img-wrap img,
.product-card:hover .img-wrap .placeholder {
  transform: scale(1.04);
}

/* nav */
.nav-link {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  text-decoration: none;
  transition: color 0.2s;
  position: relative;
  padding: 4px 0;
  cursor: pointer;
}
.nav-link:hover { color: var(--gold-deep); }
.nav-link.active::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -4px;
  height: 1px;
  background: var(--gold);
}

/* tag pill */
.pill {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 7px 14px;
  border: 1px solid var(--line);
  background: white;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 999px;
}
.pill:hover { border-color: var(--ink); }
.pill.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

/* placeholder image */
.placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--paper-warm) 0%, var(--cream) 100%);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-mute);
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  position: relative;
  overflow: hidden;
}
.placeholder::before {
  content: '';
  position: absolute;
  inset: 12px;
  border: 1px solid var(--gold-soft);
}
.placeholder.grad {
  background: var(--brand-gradient-soft);
}
.placeholder.dark {
  background: linear-gradient(135deg, #2a2520 0%, #1a1814 100%);
  color: var(--gold-soft);
}
.placeholder.dark::before {
  border-color: var(--gold-deep);
  opacity: 0.4;
}

/* gradient ring (decorative, used for the cover seal) */
.seal {
  width: 110px; height: 110px;
  border-radius: 50%;
  background: var(--brand-gradient);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  line-height: 1.3;
  padding: 12px;
}

/* fade-in helper */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.6s ease both; }

/* hide scrollbar in chat */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { scrollbar-width: none; }

/* Inputs */
.input {
  font-family: var(--sans);
  font-size: 14px;
  padding: 14px 16px;
  border: 1px solid var(--line);
  background: white;
  color: var(--ink);
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
}
.input:focus { border-color: var(--ink); }
.input-underline {
  border: none;
  border-bottom: 1px solid var(--line);
  padding: 12px 0;
  background: transparent;
  font-size: 14px;
  font-family: var(--sans);
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
}
.input-underline:focus { border-color: var(--ink); }

/* AI chat bubble look */
.chat-bubble {
  max-width: 85%;
  padding: 14px 18px;
  font-size: 14px;
  line-height: 1.55;
  border-radius: 4px;
  white-space: pre-wrap;
}
.chat-bubble.ai {
  background: white;
  border: 1px solid var(--line);
  color: var(--ink);
  align-self: flex-start;
  border-top-left-radius: 0;
}
.chat-bubble.user {
  background: var(--ink);
  color: var(--paper);
  align-self: flex-end;
  border-top-right-radius: 0;
}

/* dot pulse for typing */
@keyframes pulse-dot {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}
.typing-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--ink-mute);
  border-radius: 50%;
  margin: 0 2px;
  animation: pulse-dot 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* small marquee/ticker */
.ticker {
  background: var(--ink);
  color: var(--paper);
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 10px 0;
  overflow: hidden;
  white-space: nowrap;
}
.ticker-track {
  display: inline-block;
  animation: ticker 40s linear infinite;
  padding-left: 100%;
}
.ticker span { padding: 0 32px; }
.ticker .dot { color: var(--gold); }
@keyframes ticker {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}

/* responsive */
@media (max-width: 900px) {
  .container, .container-narrow { padding: 0 20px; }
}

</style>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false, children }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{children || label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

      sage: 'linear-gradient(160deg, #e8eee0 0%, #d4dec4 100%)',
      amber: 'linear-gradient(160deg, #f7ead0 0%, #ecd5a3 100%)',
      cream: 'linear-gradient(160deg, #f6efe1 0%, #e8d9bf 100%)',
      gold: 'linear-gradient(160deg, #f9ecc8 0%, #ecd394 100%)',
      plum: 'linear-gradient(160deg, #ecdbe7 0%, #d6bcd5 100%)',
    }[product.hue] || 'linear-gradient(160deg, #f3ede2 0%, #ede4d3 100%)';
    return (
      <div style={{
        width: '100%', aspectRatio: ratio, position: 'relative', overflow: 'hidden',
        background: hueBg,
      }}>
        <div style={{ position: 'absolute', inset: 14, border: '1px solid rgba(255,255,255,0.45)' }}/>
        <img src={product.image} alt={product.name} loading="lazy" style={{
          position: 'absolute', inset: 0, width: '100%', height: '100%',
          objectFit: 'contain', padding: '8%', mixBlendMode: 'multiply',
        }}/>
        {product.brand && (
          <div style={{
            position: 'absolute', top: 18, right: 18,
            fontFamily: 'var(--sans)', fontSize: 9, fontWeight: 700,
            letterSpacing: '0.18em', color: 'rgba(26,24,20,0.55)',
            textTransform: 'uppercase', background: 'rgba(255,255,255,0.7)',
            padding: '4px 8px',
          }}>
            by {product.brand}
          </div>
        )}
      </div>
    );
  }

  // Each product hue gets a unique illustrated placeholder
  const hueMap = {
    rose:    { bg: 'linear-gradient(160deg, #f5dccd 0%, #e8b8a0 100%)', accent: '#a85a3a', shape: 'bottle' },
    lavender:{ bg: 'linear-gradient(160deg, #d8d0e8 0%, #b5a8d0 100%)', accent: '#5a4a8a', shape: 'jar' },
    sage:    { bg: 'linear-gradient(160deg, #d8e3cc 0%, #b8c9a3 100%)', accent: '#4a6238', shape: 'bottle' },
    amber:   { bg: 'linear-gradient(160deg, #f0d8a3 0%, #d8b56a 100%)', accent: '#8a6a25', shape: 'dropper' },
    cream:   { bg: 'linear-gradient(160deg, #f0e6d3 0%, #d8c8a8 100%)', accent: '#8a7548', shape: 'jar' },
    gold:    { bg: 'linear-gradient(160deg, #f3e3b8 0%, #d8b96a 100%)', accent: '#6a5025', shape: 'card' },
    plum:    { bg: 'linear-gradient(160deg, #d8c0d8 0%, #a888b8 100%)', accent: '#5a3a6a', shape: 'card' },
  };
  const h = hueMap[product.hue] || hueMap.cream;

  return (
    <div style={{
      width: '100%',
      aspectRatio: ratio,
      background: h.bg,
      position: 'relative',
      overflow: 'hidden',
    }}>
      <div style={{ position: 'absolute', inset: 16, border: '1px solid rgba(255,255,255,0.4)' }}/>
      <ProductIllustration shape={h.shape} accent={h.accent} name={product.name}/>
      <div style={{
        position: 'absolute', bottom: 22, left: 22,
        fontFamily: 'var(--serif)', fontStyle: 'italic',
        fontSize: 11, color: h.accent, letterSpacing: '0.04em',
      }}>
        Pinnacle · est. 2023
      </div>
    </div>
  );
}

// AI Chat Assistant for Pinnacle
const { useState: useStateChat, useEffect: useEffectChat, useRef: useRefChat } = React;

function PinnacleChat({ open, onClose, navigate, addToCart }) {
  const [messages, setMessages] = useStateChat([
    {
      role: 'assistant',
      content: "Hello, beautiful — I'm your Pinnacle wellness guide ✦\n\nI can help you find the right products for your goals, explain ingredients, check on an order, book a session with Mercy, or just answer any wellness question on your mind.\n\nWhat would you like to talk about today?",
    },
  ]);
  const [input, setInput] = useStateChat('');
  const [loading, setLoading] = useStateChat(false);
  const scrollRef = useRefChat(null);

  useEffectChat(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [messages, loading]);

  const quickPrompts = [
    'Recommend a product for stress',
    'Best for glowing skin?',
    'How do I become a Premium member?',
    'Book a 1:1 with Mercy',
    'Track my order',
  ];

  const productContext = window.PINNACLE_DATA.products.map(p =>
    `- ${p.name} ($${p.priceUSD}) — ${p.tagline}. ${p.shortDesc}`
  ).join('\n');

  const systemPrompt = `You are Pinnacle's AI wellness guide — warm, knowledgeable, and grounded.
You represent Pinnacle Home of Wellness, founded by Mercy Ikpe in Nigeria. Tagline: "Live well. Look well. Be well."

PERSONALITY: Warm and encouraging like a wise older sister. Direct, practical, never preachy. Use occasional ✦ but don't overdo it. Keep responses to 3–5 short paragraphs max.

WHAT YOU CAN DO:
1. Recommend products from this catalog based on user goals
2. Explain ingredients, benefits, directions
3. Help with order tracking (ask for order # — say "I'll pull that up" then provide a friendly mock status)
4. Onboard new Premium members (mention $29/mo, 15% off, monthly call with Mercy)
5. Help book a 1:1 with Mercy ($180, 60 min Zoom — direct them to the Coaching product)
6. Answer general wellness questions (sleep, stress, skin, gut, hormones)

CATALOG:
${productContext}

When recommending a product, name it clearly so we can show it visually.
For medical questions, gently remind users to consult a doctor for diagnoses.
Keep replies concise. Bullet points for benefits, otherwise prose.`;

  async function send(text) {
    const trimmed = text.trim();
    if (!trimmed || loading) return;

    const newMessages = [...messages, { role: 'user', content: trimmed }];
    setMessages(newMessages);
    setInput('');
    setLoading(true);

    try {
      const reply = await window.claude.complete({
        messages: [
          { role: 'user', content: `${systemPrompt}\n\nConversation:\n${newMessages.map(m => `${m.role.toUpperCase()}: ${m.content}`).join('\n\n')}\n\nReply as ASSISTANT:` }
        ],
      });
      setMessages([...newMessages, { role: 'assistant', content: reply }]);
    } catch (e) {
      setMessages([...newMessages, {
        role: 'assistant',
        content: "I'm having trouble reaching the cloud right now. In the meantime, you can browse our shop or message Mercy on WhatsApp — she replies personally.",
      }]);
    } finally {
      setLoading(false);
    }
  }

  // Detect mentioned products in last AI message and surface a card
  const lastAi = [...messages].reverse().find(m => m.role === 'assistant');
  const mentionedProducts = lastAi
    ? window.PINNACLE_DATA.products.filter(p =>
        lastAi.content.toLowerCase().includes(p.name.toLowerCase()) ||
        lastAi.content.toLowerCase().includes(p.name.split(' ')[0].toLowerCase() + ' ' + (p.name.split(' ')[1] || '').toLowerCase())
      ).slice(0, 2)
    : [];

  if (!open) return null;

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 100,
      display: 'flex', justifyContent: 'flex-end',
      background: 'rgba(26,24,20,0.4)', backdropFilter: 'blur(4px)',
      animation: 'fadeUp 0.3s ease',
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        width: 'min(480px, 100%)', height: '100%',
        background: 'var(--paper)', display: 'flex', flexDirection: 'column',
        boxShadow: '-24px 0 60px rgba(0,0,0,0.2)',
      }}>
        {/* header */}
        <div style={{
          padding: '24px 28px', borderBottom: '1px solid var(--line)',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          background: 'white',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{
              width: 42, height: 42, borderRadius: '50%',
              background: 'var(--brand-gradient)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: 'white', fontFamily: 'var(--serif)', fontSize: 20, fontWeight: 600,
            }}>P</div>
            <div>
              <div style={{ fontFamily: 'var(--serif)', fontSize: 18, fontWeight: 600 }}>Pinnacle AI</div>
              <div style={{ fontSize: 11, color: 'var(--success)', display: 'flex', alignItems: 'center', gap: 6 }}>
                <span style={{ width: 6, height: 6, background: 'var(--success)', borderRadius: '50%' }}/>
                Online · Wellness guide
              </div>
            </div>
          </div>
          <button onClick={onClose} style={{
            background: 'transparent', border: 'none', cursor: 'pointer',
            padding: 8, color: 'var(--ink-mute)',
          }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        {/* messages */}
        <div ref={scrollRef} className="no-scrollbar" style={{
          flex: 1, overflowY: 'auto', padding: '24px 28px',
          display: 'flex', flexDirection: 'column', gap: 16,
        }}>
          {messages.map((m, i) => (
            <div key={i} className={`chat-bubble ${m.role === 'assistant' ? 'ai' : 'user'}`}>
              {m.content}
            </div>
          ))}

          {/* surface mentioned products */}
          {!loading && mentionedProducts.length > 0 && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10, alignSelf: 'flex-start', maxWidth: '95%' }}>
              {mentionedProducts.map(p => (
                <div key={p.id} style={{
                  background: 'white', border: '1px solid var(--line)',
                  padding: 12, display: 'flex', gap: 12, alignItems: 'center',
                  cursor: 'pointer',
                }} onClick={() => { navigate('product', p.id); onClose(); }}>
                  <div style={{ width: 64, height: 64, flexShrink: 0 }}>
                    <ProductImage product={p}/>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div className="serif" style={{ fontSize: 15, fontWeight: 600 }}>{p.name}</div>
                    <div style={{ fontSize: 11, color: 'var(--ink-mute)', fontStyle: 'italic' }}>{p.tagline}</div>
                    <div style={{ fontSize: 13, fontWeight: 600, marginTop: 4 }}>${p.priceUSD}</div>
                  </div>
                  <button onClick={e => { e.stopPropagation(); addToCart(p); }} style={{
                    background: 'var(--ink)', color: 'var(--paper)', border: 'none',
                    padding: '8px 12px', fontSize: 10, letterSpacing: '0.16em',
                    fontWeight: 600, cursor: 'pointer', textTransform: 'uppercase',
                  }}>Add</button>
                </div>
              ))}
            </div>
          )}

          {loading && (
            <div className="chat-bubble ai" style={{ background: 'white' }}>
              <span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/>
            </div>
          )}
        </div>

        {/* quick prompts */}
        {messages.length <= 1 && (
          <div style={{ padding: '0 28px 16px', display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {quickPrompts.map(q => (
              <button key={q} onClick={() => send(q)} className="pill" style={{ fontSize: 11, padding: '6px 12px' }}>
                {q}
              </button>
            ))}
          </div>
        )}

        {/* input */}
        <form onSubmit={e => { e.preventDefault(); send(input); }} style={{
          padding: '20px 28px', borderTop: '1px solid var(--line)',
          background: 'white', display: 'flex', gap: 12,
        }}>
          <input
            value={input}
            onChange={e => setInput(e.target.value)}
            placeholder="Ask about products, wellness, your order..."
            style={{
              flex: 1, border: '1px solid var(--line)',
              padding: '12px 16px', fontSize: 14, outline: 'none',
              fontFamily: 'var(--sans)',
            }}
            disabled={loading}
          />
          <button type="submit" disabled={loading || !input.trim()} style={{
            background: input.trim() && !loading ? 'var(--brand-gradient)' : 'var(--line)',
            color: 'white', border: 'none', padding: '0 20px', cursor: loading ? 'wait' : 'pointer',
            fontSize: 11, letterSpacing: '0.16em', fontWeight: 700, textTransform: 'uppercase',
          }}>Send</button>
        </form>
        <div style={{ padding: '0 28px 16px', fontSize: 10, color: 'var(--ink-mute)', textAlign: 'center', letterSpacing: '0.06em' }}>
          AI guidance is informational. For medical concerns, consult a healthcare provider.
        </div>
      </div>
    </div>
  );
}

window.PinnacleChat = PinnacleChat;

function ShopPage({ navigate, addToCart, currency }) {
  const data = window.PINNACLE_DATA;
  const [filter, setFilter] = useStateP('all');
  const [sort, setSort] = useStateP('featured');

  const filtered = useMemoP(() => {
    let list = filter === 'all' ? data.products : data.products.filter(p => p.collections.includes(filter));
    if (sort === 'price-asc') list = [...list].sort((a, b) => a.priceUSD - b.priceUSD);
    else if (sort === 'price-desc') list = [...list].sort((a, b) => b.priceUSD - a.priceUSD);
    else if (sort === 'rating') list = [...list].sort((a, b) => b.rating - a.rating);
    return list;
  }, [filter, sort]);

  return (
    <div>
      {/* Banner */}
      <section style={{ padding: '60px 0 40px', background: 'var(--paper-warm)', textAlign: 'center' }}>
        <div className="container-narrow">
          <div className="eyebrow eyebrow-gold" style={{ marginBottom: 18 }}>The Shop</div>
          <h1 className="display" style={{ fontSize: 'clamp(48px, 7vw, 88px)', marginBottom: 20 }}>
            Wellness, <span style={{ fontStyle: 'italic' }}>curated</span>
          </h1>
          <p className="serif" style={{ fontSize: 18, fontStyle: 'italic', color: 'var(--ink-mute)', maxWidth: 520, margin: '0 auto' }}>
            Every product hand-selected by Mercy. Clean ingredients, third-party tested, and formulated for the way real women live.
          </p>
        </div>
      </section>

      {/* Filters */}
      <section style={{ padding: '40px 0', borderBottom: '1px solid var(--line)' }}>
        <div className="container" style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 16,
        }}>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {data.collections.map(c => (
              <button key={c.id} onClick={() => setFilter(c.id)}
                className={'pill' + (filter === c.id ? ' active' : '')}>
                {c.label}
              </button>
            ))}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <span className="eyebrow" style={{ fontSize: 10 }}>Sort by</span>
            <select value={sort} onChange={e => setSort(e.target.value)} style={{
              border: '1px solid var(--line)', padding: '8px 12px',
              fontFamily: 'var(--sans)', fontSize: 12, background: 'white', outline: 'none',
              letterSpacing: '0.05em',
            }}>
              <option value="featured">Featured</option>
              <option value="rating">Top Rated</option>
              <option value="price-asc">Price: Low → High</option>
              <option value="price-desc">Price: High → Low</option>
            </select>
          </div>
        </div>
      </section>

      {/* Grid */}
      <section style={{ padding: '64px 0 100px' }}>
        <div className="container">
          <div style={{ marginBottom: 24, fontSize: 12, color: 'var(--ink-mute)', letterSpacing: '0.1em' }}>
            Showing {filtered.length} {filtered.length === 1 ? 'product' : 'products'}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 36, rowGap: 56 }}>
            {filtered.map(p => (
              <ProductCard key={p.id} product={p} currency={currency}
                onClick={() => navigate('product', p.id)}
                addToCart={addToCart}/>
            ))}
          </div>
        </div>
      </section>
    </div>
  );
}

function App() {
  const [route, setRoute] = useState({ page: 'home', id: null });
  const [cart, setCart] = useState([]);
  const [chatOpen, setChatOpen] = useState(false);
  const [cartOpen, setCartOpen] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweak] = useTweaks({
    "currency": "USD",
    "showAIBubble": true,
    "accentMode": "gold"
  });

  useEffect(() => {
    function read() {
      const h = (window.location.hash || '#home').slice(1);
      const [page, id] = h.split('/');
      setRoute({ page: page || 'home', id });
      window.scrollTo(0, 0);
    }
    read();
    window.addEventListener('hashchange', read);
    return () => window.removeEventListener('hashchange', read);
  }, []);

  function navigate(page, id) {
    window.location.hash = id ? `${page}/${id}` : page;
  }

  function addToCart(product) {
    setCart(prev => {
      const existing = prev.find(item => item.product.id === product.id);
      if (existing) return prev.map(item => item.product.id === product.id ? { ...item, qty: item.qty + 1 } : item);
      return [...prev, { product, qty: 1 }];
    });
    setCartOpen(true);
    setTimeout(() => setCartOpen(false), 1800);
  }
  function removeFromCart(id) { setCart(prev => prev.filter(item => item.product.id !== id)); }
  function updateQty(id, q) {
    if (q < 1) return removeFromCart(id);
    setCart(prev => prev.map(item => item.product.id === id ? { ...item, qty: q } : item));
  }

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);
  const currency = tweaks.currency || 'USD';

  let body;
  if (route.page === 'home') body = <HomePage navigate={navigate} addToCart={addToCart} currency={currency} openChat={() => setChatOpen(true)}/>;
  else if (route.page === 'shop') body = <ShopPage navigate={navigate} addToCart={addToCart} currency={currency}/>;
  else if (route.page === 'product') body = <ProductPage productId={route.id} navigate={navigate} addToCart={addToCart} currency={currency} openChat={() => setChatOpen(true)}/>;
  else if (route.page === 'about') body = <AboutPage navigate={navigate}/>;
  else if (route.page === 'journal') body = <JournalPage navigate={navigate}/>;
  else if (route.page === 'membership') body = <MembershipPage navigate={navigate}/>;
  else if (route.page === 'contact') body = <ContactPage/>;
  else body = <HomePage navigate={navigate} addToCart={addToCart} currency={currency} openChat={() => setChatOpen(true)}/>;

  return (
    <>
      <Header
        route={route.page}
        navigate={navigate}
        cartCount={cartCount}
        openChat={() => setChatOpen(true)}
        openCart={() => setCartOpen(true)}
      />
      {body}
      <Footer navigate={navigate}/>

      <PinnacleChat open={chatOpen} onClose={() => setChatOpen(false)} navigate={navigate} addToCart={addToCart}/>
      <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)} cart={cart}
        removeFromCart={removeFromCart} updateQty={updateQty} currency={currency} navigate={navigate}/>

      {tweaks.showAIBubble && !chatOpen && (
        <button onClick={() => setChatOpen(true)} style={{
          position: 'fixed', bottom: 28, right: 28, zIndex: 80,
          width: 64, height: 64, borderRadius: '50%',
          background: 'var(--brand-gradient)',
          border: 'none', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: 'white', boxShadow: '0 12px 32px rgba(107,43,184,0.4)',
        }} title="Ask Pinnacle AI">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6">
            <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          <span style={{
            position: 'absolute', top: -4, right: -4,
            width: 16, height: 16, borderRadius: '50%',
            background: 'var(--gold)', border: '2px solid var(--paper)',
          }}/>
        </button>
      )}

      <TweaksPanel open={tweaksOpen} onClose={() => setTweaksOpen(false)} title="Tweaks">
        <TweakSection title="Pricing">
          <TweakRadio label="Currency" value={tweaks.currency} onChange={v => setTweak('currency', v)}
            options={[{ value: 'USD', label: '$ USD' }, { value: 'NGN', label: '\u20a6 NGN' }]}/>
        </TweakSection>
        <TweakSection title="AI Assistant">
          <TweakToggle label="Show floating chat bubble" value={tweaks.showAIBubble} onChange={v => setTweak('showAIBubble', v)}/>
          <TweakButton onClick={() => setChatOpen(true)}>Open chat now ✦</TweakButton>
        </TweakSection>
        <TweakSection title="Quick Demo">
          <TweakButton onClick={() => { addToCart(window.PINNACLE_DATA.products[0]); }}>Add a product to cart</TweakButton>
          <TweakButton onClick={() => navigate('product', 'velvet-serum')}>Jump to Velvet Serum PDP</TweakButton>
          <TweakButton onClick={() => navigate('membership')}>Jump to Premium</TweakButton>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
